services:
    _defaults:
        autowire: false
        autoconfigure: false
        public: false

    # --- Core Bridge Services ---

    Octo\SymfonyBridge\MetricsBridge:
        arguments:
            $collector: '@Octo\RuntimePack\MetricsCollector'
        public: false

    Octo\SymfonyBridge\ResetManager:
        arguments:
            $kernel: '@kernel'
            $logger: '@logger'
            $metricsBridge: '@Octo\SymfonyBridge\MetricsBridge'
            $resetWarningMs: '%octo.reset_warning_ms%'
        public: true

    Octo\SymfonyBridge\RequestIdProcessor:
        tags:
            - { name: monolog.processor }
        public: false

    Octo\SymfonyBridge\HttpKernelAdapter:
        arguments:
            $kernel: '@kernel'
            $logger: '@logger'
            $metricsCollector: '@Octo\RuntimePack\MetricsCollector'
            $kernelRebootEvery: '%octo.kernel_reboot_every%'
            $resetWarningMs: '%octo.reset_warning_ms%'
            $debug: '%kernel.debug%'
            $memoryWarningThreshold: '%octo.memory_warning_threshold%'
        public: true

    # --- Runtime Pack (expected to be provided by the application or runtime) ---

    Octo\RuntimePack\MetricsCollector:
        class: Octo\RuntimePack\MetricsCollector
        public: false
