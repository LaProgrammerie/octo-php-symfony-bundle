# Async Platform — Default configuration
# See: https://github.com/async-platform/symfony-bundle

async_platform:
    # Memory RSS warning threshold in bytes (default: 100 MB)
    memory_warning_threshold: '%env(int:ASYNC_PLATFORM_SYMFONY_MEMORY_WARNING_THRESHOLD)%'

    # Reset duration warning threshold in milliseconds
    reset_warning_ms: '%env(int:ASYNC_PLATFORM_SYMFONY_RESET_WARNING_MS)%'

    # Reboot kernel every N requests (0 = disabled)
    kernel_reboot_every: '%env(int:ASYNC_PLATFORM_SYMFONY_KERNEL_REBOOT_EVERY)%'

    # Messenger transport (auto-detected if async-platform/symfony-messenger is installed)
    # messenger:
    #     channel_capacity: 100
    #     consumers: 1
    #     send_timeout: 5.0

    # Realtime / WebSocket (auto-detected if async-platform/symfony-realtime is installed)
    # realtime:
    #     ws_max_lifetime_seconds: 3600

    # OpenTelemetry (auto-detected if async-platform/symfony-otel is installed)
    # otel:
    #     enabled: true
